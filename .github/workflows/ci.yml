name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff

      - name: Lint with ruff
        run: |
          ruff check palaia/ tests/ || (echo "❌ Ruff lint failed. Fix locally: pip install ruff && ruff check --fix palaia/ tests/ && ruff format palaia/ tests/" && exit 1)

      - name: Run tests
        run: pytest tests/ -v

  test-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        working-directory: packages/openclaw-plugin
        run: npm install
      - name: Run plugin tests
        working-directory: packages/openclaw-plugin
        run: npx vitest run
