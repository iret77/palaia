<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palaia Memory Explorer</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="app">
    <header>
        <h1>🧠 <span>Palaia</span> Memory Explorer</h1>
        <div class="stats-bar" id="stats-bar">
            <span class="stat" id="stat-total">...</span>
            <span class="stat" id="stat-version">...</span>
        </div>
    </header>

    <div class="toolbar">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Search memories..." autofocus>
            <button onclick="doSearch()">Search</button>
        </div>
        <button class="btn-create" onclick="showCreateForm()">+ New Entry</button>
    </div>

    <div class="filters">
        <select id="filter-type" onchange="applyFilters()">
            <option value="">All Types</option>
            <option value="memory">Memory</option>
            <option value="task">Task</option>
            <option value="process">Process</option>
        </select>
        <select id="filter-tier" onchange="applyFilters()">
            <option value="">All Tiers</option>
            <option value="hot">Hot</option>
            <option value="warm">Warm</option>
            <option value="cold">Cold</option>
        </select>
        <select id="filter-project" onchange="applyFilters()">
            <option value="">All Projects</option>
        </select>
        <select id="filter-status" onchange="applyFilters()">
            <option value="">All Statuses</option>
            <option value="open">Open</option>
            <option value="in-progress">In Progress</option>
            <option value="done">Done</option>
            <option value="blocked">Blocked</option>
        </select>
    </div>

    <div class="result-count" id="result-count"></div>
    <div class="entry-list" id="entry-list">
        <div class="loading">Loading entries...</div>
    </div>

    <!-- Detail panel rendered inline below cards -->

    <!-- Create/Edit modal -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modal-title">New Entry</h2>
                <button class="btn-close" onclick="closeModal()">✕</button>
            </div>
            <form id="entry-form" onsubmit="return submitEntryForm(event)">
                <input type="hidden" id="form-id" value="">

                <label for="form-body">Content *</label>
                <textarea id="form-body" rows="6" required placeholder="Write your memory..."></textarea>

                <div class="form-row">
                    <div class="form-group">
                        <label for="form-title">Title</label>
                        <input type="text" id="form-title" placeholder="Auto-generated if empty">
                    </div>
                    <div class="form-group">
                        <label for="form-type">Type</label>
                        <select id="form-type" onchange="toggleTaskFields()">
                            <option value="memory">Memory</option>
                            <option value="task">Task</option>
                            <option value="process">Process</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="form-scope">Scope</label>
                        <select id="form-scope">
                            <option value="team">Team</option>
                            <option value="private">Private</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="form-tags">Tags</label>
                        <input type="text" id="form-tags" placeholder="comma,separated">
                    </div>
                </div>

                <div class="task-fields" id="task-fields">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="form-priority">Priority</label>
                            <select id="form-priority">
                                <option value="">None</option>
                                <option value="low">Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                                <option value="critical">Critical</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="form-status">Status</label>
                            <select id="form-status">
                                <option value="">None</option>
                                <option value="open">Open</option>
                                <option value="in-progress">In Progress</option>
                                <option value="done">Done</option>
                                <option value="blocked">Blocked</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="form-assignee">Assignee</label>
                            <input type="text" id="form-assignee" placeholder="agent name">
                        </div>
                        <div class="form-group">
                            <label for="form-due">Due Date</label>
                            <input type="date" id="form-due">
                        </div>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn-submit" id="form-submit-btn">Create Entry</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>
</div>
<script src="/app.js"></script>
</body>
</html>
